version: "3.9"

# ──────────────────────────────────────────────────────────
#  AI Business Decision Copilot — Docker Compose
#  Usage:  docker compose up --build
# ──────────────────────────────────────────────────────────

services:

  # ── Streamlit Dashboard ────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql://erp:erp@postgres:5432/erp_copilot
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql://erp:erp@postgres:5432/erp_copilot
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── PostgreSQL Database ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
